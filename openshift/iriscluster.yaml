apiVersion: intersystems.com/v1alpha1
kind: IrisCluster
metadata:
  name: iris
spec:
  licenseKeySecret:
    name: iris-license
  topology:
    data:
      image: quay.io/jkeam1/secured-rest-api@sha256:d3ad5d5987da7c545af8e8f68febb487f045389a511580626430b9b5ecba96f7
      podTemplate:
        spec:
          args:
          - --check-caps
          - "false"
        readinessProbe:
          httpGet:
            path: /
            port: 52773
          initialDelaySeconds: 30
          periodSeconds: 10
