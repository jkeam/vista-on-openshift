apiVersion: intersystems.com/v1alpha1
kind: IrisCluster
metadata:
  name: iris
spec:
  licenseKeySecret:
    name: iris-license
  topology:
    data:
      image: quay.io/jkeam1/secured-rest-api@sha256:bb4a712a8fff8ade57c8fc7bb32edd171bc1e1fbe48343584b86f7d0db5d66fc
      podTemplate:
        spec:
          args:
          - --check-caps
          - "false"
        readinessProbe:
          httpGet:
            path: /
            port: 52773
          initialDelaySeconds: 30
          periodSeconds: 10
