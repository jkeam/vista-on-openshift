apiVersion: intersystems.com/v1alpha1
kind: IrisCluster
metadata:
  name: iris
spec:
  licenseKeySecret:
    name: iris-license
  topology:
    data:
      image: quay.io/jkeam1/secured-rest-api@sha256:b8478bfac2bafa9a3954fe14f4bef066c3ff55413db84443e4d411074300ce58
      podTemplate:
        spec:
          args:
          - --check-caps
          - "false"
        readinessProbe:
          httpGet:
            path: /
            port: 52773
          initialDelaySeconds: 30
          periodSeconds: 10
